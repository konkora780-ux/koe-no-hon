<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="こえのほん">
<meta name="theme-color" content="#3c7a89">
<title>こえのほん</title>
<!-- アプリアイコン（iPadの「ホーム画面に追加」で使われる） -->
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" sizes="180x180" href="icon-180.png">
<link rel="manifest" href="manifest.webmanifest">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1f2b36;
    --paper:#fffdf7;
    --shelfwood:#e8dcc8;
    --card:#ffffff;
    --line:#ddd3c2;
    --teal:#3c7a89;        /* 再生・決定 */
    --teal-d:#2c5d69;
    --rec:#c4453b;         /* 録音 */
    --gold:#f0b429;        /* ページ番号・アクセント */
    --sub:#7a8894;
    --r:20px;
    --lift:0 6px 0 rgba(31,43,54,.10), 0 12px 24px -12px rgba(31,43,54,.35);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    margin:0;background:var(--paper);color:var(--ink);
    font-family:"Zen Kaku Gothic New","Hiragino Maru Gothic ProN",system-ui,sans-serif;
    -webkit-user-select:none;user-select:none;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  h1,h2,.book .t,.big{font-family:"Zen Maru Gothic","Hiragino Maru Gothic ProN",sans-serif}
  .screen{display:none;height:100dvh;flex-direction:column}
  .screen.on{display:flex}

  /* ヘッダー：紙の帯 */
  header{
    display:flex;align-items:center;gap:8px;padding:12px 16px;flex:none;
    background:linear-gradient(180deg,#fff,#fbf7ee);
    border-bottom:1px solid var(--line);
    box-shadow:0 6px 18px -14px rgba(31,43,54,.5);
  }
  header h1{font-size:22px;margin:0;flex:1;letter-spacing:.08em;display:flex;align-items:center;gap:10px}
  /* 声の波形マーク（このアプリの目印） */
  .wave{display:inline-flex;align-items:flex-end;gap:3px;height:22px}
  .wave i{width:3px;border-radius:2px;background:var(--teal);animation:w 1.1s ease-in-out infinite}
  .wave i:nth-child(1){height:40%;animation-delay:0s}
  .wave i:nth-child(2){height:85%;animation-delay:.15s;background:var(--gold)}
  .wave i:nth-child(3){height:60%;animation-delay:.3s}
  .wave i:nth-child(4){height:100%;animation-delay:.45s;background:var(--rec)}
  .wave i:nth-child(5){height:50%;animation-delay:.6s}
  @keyframes w{0%,100%{transform:scaleY(.5)}50%{transform:scaleY(1)}}

  button{
    font:inherit;font-weight:600;color:var(--ink);background:#fff;
    border:1.5px solid var(--line);border-radius:14px;padding:10px 16px;
    box-shadow:0 3px 0 rgba(31,43,54,.10);cursor:pointer;min-height:48px;
    transition:transform .08s,box-shadow .08s;
  }
  button:active{transform:translateY(3px);box-shadow:none}
  button:focus-visible{outline:3px solid var(--teal);outline-offset:3px}
  .primary{background:var(--teal);color:#fff;border-color:var(--teal-d);box-shadow:0 3px 0 var(--teal-d)}
  .danger{background:#fff;color:var(--rec);border-color:#e6bdb8;box-shadow:0 3px 0 #e6bdb8}
  .big{font-size:20px;font-weight:700;padding:15px 22px;border-radius:18px}
  main{flex:1;overflow:auto;padding:24px 18px 40px}

  /* 本棚：棚板の上に本が立つ */
  .shelf{
    display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
    gap:26px 20px;max-width:1100px;margin:0 auto;
  }
  .book{
    position:relative;background:var(--card);border:1px solid var(--line);
    border-radius:6px 16px 16px 6px;padding:12px 12px 14px;
    box-shadow:var(--lift);cursor:pointer;text-align:left;
    transition:transform .18s ease, box-shadow .18s ease;
  }
  .book::before{ /* 背表紙 */
    content:"";position:absolute;left:0;top:0;bottom:0;width:10px;
    border-radius:6px 0 0 6px;background:linear-gradient(180deg,var(--teal),var(--teal-d));
  }
  .book:hover,.book:focus-visible{transform:translateY(-6px) rotate(-.6deg);box-shadow:0 14px 0 rgba(31,43,54,.06),0 26px 34px -18px rgba(31,43,54,.5)}
  .book .cover{
    width:100%;aspect-ratio:4/3;border-radius:10px;overflow:hidden;margin-left:6px;
    background:repeating-linear-gradient(135deg,#f6f1e6,#f6f1e6 10px,#f1ebdd 10px,#f1ebdd 20px);
    display:flex;align-items:center;justify-content:center;font-size:36px;
  }
  .book .cover img{width:100%;height:100%;object-fit:cover}
  .book .t{margin:10px 0 2px 6px;font-weight:700;font-size:17px;line-height:1.4;word-break:break-word}
  .book .n{margin-left:6px;color:var(--sub);font-size:13px;letter-spacing:.04em}

  /* ページ一覧 */
  .pages{display:flex;flex-direction:column;gap:14px;max-width:780px;margin:0 auto}
  .page{
    position:relative;background:var(--card);border:1px solid var(--line);border-radius:var(--r);
    padding:14px 14px 14px 20px;display:flex;gap:14px;align-items:center;box-shadow:var(--lift);
  }
  .page::before{ /* 左端の綴じ目。こえがあると色がつく */
    content:"";position:absolute;left:0;top:14px;bottom:14px;width:6px;border-radius:0 6px 6px 0;
    background:var(--line);
  }
  .page.has::before{background:linear-gradient(180deg,var(--gold),var(--rec))}
  .page .num{
    width:36px;height:36px;flex:none;border-radius:12px;background:var(--ink);color:#fff;
    display:flex;align-items:center;justify-content:center;font-weight:700;
    font-family:"Zen Maru Gothic",sans-serif;
  }
  .thumb{
    width:92px;height:70px;flex:none;border-radius:12px;overflow:hidden;font-size:26px;
    background:repeating-linear-gradient(135deg,#f6f1e6,#f6f1e6 8px,#f1ebdd 8px,#f1ebdd 16px);
    display:flex;align-items:center;justify-content:center;
  }
  .thumb img{width:100%;height:100%;object-fit:cover}
  .page .body{flex:1;min-width:0}
  .page .label{font-weight:700;font-size:17px;word-break:break-word}
  .page .state{font-size:13px;color:var(--sub);margin-top:4px;display:flex;align-items:center;gap:6px}
  .page .ops{display:flex;gap:6px;flex:none;flex-wrap:wrap;justify-content:flex-end}
  .page .ops button{min-height:44px;padding:8px 12px;border-radius:12px;font-size:15px}

  /* 再生：舞台 */
  #play{background:radial-gradient(120% 100% at 50% 0%,#24384a 0%,#111c26 70%)}
  #playStage{flex:1;display:flex;align-items:center;justify-content:center;position:relative;cursor:pointer;overflow:hidden}
  #playStage img,#playStage video{max-width:92%;max-height:88%;object-fit:contain;border-radius:18px;box-shadow:0 30px 60px -20px #000;background:#000}
  #playText{
    color:#fff;font-family:"Zen Maru Gothic",sans-serif;
    font-size:clamp(30px,6.5vw,72px);font-weight:700;padding:24px;text-align:center;line-height:1.5;
  }
  #playHint{position:absolute;left:0;right:0;bottom:16px;text-align:center;color:#8ea6b6;font-size:15px;letter-spacing:.06em}
  #playStage.playing::after{
    content:"";position:absolute;inset:12px;border-radius:24px;
    box-shadow:0 0 0 6px var(--gold) inset;animation:glow 1.1s ease-in-out infinite;pointer-events:none;
  }
  @keyframes glow{0%,100%{opacity:.25}50%{opacity:.9}}
  .playbar{display:flex;gap:10px;align-items:center;padding:12px 16px;background:rgba(8,15,21,.85);flex:none;backdrop-filter:blur(6px)}
  .playbar .pos{color:#8ea6b6;flex:1;text-align:center;font-size:17px;letter-spacing:.1em}
  .playbar button{background:#22384a;color:#fff;border-color:#365467;box-shadow:0 3px 0 #16283a}

  /* 録音シート */
  .modal{position:fixed;inset:0;background:rgba(17,28,38,.55);backdrop-filter:blur(3px);
    display:none;align-items:center;justify-content:center;padding:16px;z-index:10}
  .modal.on{display:flex}
  .sheet{
    background:var(--card);border-radius:26px;padding:22px;width:min(540px,100%);max-height:92dvh;overflow:auto;
    box-shadow:0 30px 60px -20px rgba(0,0,0,.5);border-top:8px solid var(--gold);
  }
  .sheet h2{margin:0 0 14px;font-size:21px;letter-spacing:.04em}
  .row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
  input[type=text]{
    font:inherit;width:100%;padding:14px;border:1.5px solid var(--line);border-radius:14px;background:#fdfbf6;
    -webkit-user-select:text;user-select:text;
  }
  input[type=text]:focus{outline:none;border-color:var(--teal);background:#fff}
  #recPreview{border:1.5px dashed var(--line)}
  .recdot{width:14px;height:14px;border-radius:50%;background:var(--rec);display:inline-block;margin-right:8px;animation:blink .8s infinite}
  @keyframes blink{50%{opacity:.2}}
  .empty{text-align:center;color:var(--sub);padding:56px 10px;line-height:2;font-size:16px}

  /* マイクの音メーター（音スイッチのめやす） */
  #micBar{position:absolute;left:16px;right:16px;top:10px;height:16px;border-radius:8px;
    background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.28);overflow:visible;z-index:2}
  #micFill{height:100%;width:0%;border-radius:8px;background:linear-gradient(90deg,var(--teal),var(--gold));transition:width .05s linear}
  #micThr{position:absolute;top:-4px;bottom:-4px;width:3px;background:var(--rec);border-radius:2px;left:50%}
  .playbar button.on{background:var(--gold);color:#3a2b00;border-color:#c98e0a;box-shadow:0 3px 0 #c98e0a}

  /* せってい・スライダー */
  input[type=range]{width:100%;height:40px}
  .seg{display:flex;gap:8px;flex-wrap:wrap}
  .seg button{flex:1;min-width:90px}
  .seg button.on{background:var(--teal);color:#fff;border-color:var(--teal-d);box-shadow:0 3px 0 var(--teal-d)}
  .setlabel{font-weight:700;margin:10px 0 8px;font-size:16px}
  .setmeter{height:18px;border-radius:9px;background:#eee;border:1px solid var(--line);position:relative;margin-bottom:8px;overflow:visible}
  #setMeterFill{height:100%;width:0%;border-radius:9px;background:linear-gradient(90deg,var(--teal),var(--gold))}
  #setMeterThr{position:absolute;top:-3px;bottom:-3px;width:3px;background:var(--rec);border-radius:2px;left:50%}

  /* 本カードの複製ボタン */
  .book .dup{position:absolute;top:8px;right:8px;min-height:0;padding:6px 10px;font-size:13px;border-radius:10px;z-index:3}

  /* シンボルえらび（ドロップス） */
  .symgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(104px,1fr));gap:10px;padding:4px}
  .symtile{border:1.5px solid var(--line);border-radius:14px;background:#fff;padding:6px;
    cursor:pointer;text-align:center;min-height:0;box-shadow:0 2px 0 rgba(31,43,54,.08)}
  .symtile img{width:100%;aspect-ratio:1;object-fit:contain;background:#fff;display:block}
  .symtile .w{font-size:13px;font-weight:700;margin-top:4px;word-break:break-word;line-height:1.3}
  .symtile:active{transform:translateY(2px);box-shadow:none}
  #symScroll{overflow:auto;flex:1;min-height:200px;-webkit-overflow-scrolling:touch}
  #symBig{width:100%;height:200px;display:flex;align-items:center;justify-content:center}
  #symBig img{max-width:100%;max-height:100%;object-fit:contain}

  /* 印刷（紙の絵本） */
  #printArea{display:none}
  @media print{
    @page{margin:12mm}
    body{background:#fff;padding:0}
    body>*{display:none !important}
    #printArea{display:block !important}
    .p-title{font-size:20pt;font-weight:700;margin:0 0 8mm;text-align:center}
    .p-grid{display:grid;grid-template-columns:1fr 1fr;gap:8mm}
    .p-card{border:1px solid #bbb;border-radius:6px;padding:6mm;break-inside:avoid;text-align:center}
    .p-card img{width:100%;height:60mm;object-fit:contain}
    .p-ph{height:60mm;display:flex;align-items:center;justify-content:center;font-size:40pt;background:#f4efe4;border-radius:6px}
    .p-num{font-weight:700;color:#666;font-size:11pt}
    .p-label{font-size:16pt;font-weight:700;margin-top:4mm;word-break:break-word}
  }
  .hide{display:none !important}
  @media (prefers-reduced-motion:reduce){*{animation:none !important;transition:none !important}}
</style>
</head>
<body>

<!-- 本棚 -->
<section id="shelf" class="screen on">
  <header>
    <h1><span class="wave"><i></i><i></i><i></i><i></i><i></i></span>こえのほん</h1>
    <button id="btnImport">よみこみ</button>
    <button id="btnExportAll">ぜんぶ かきだし</button>
    <button id="btnNewBook" class="primary">＋ ほんをつくる</button>
  </header>
  <main>
    <div id="shelfList" class="shelf"></div>
    <div id="shelfEmpty" class="empty">まだ ほんが ありません。<br>「＋ ほんをつくる」から はじめましょう。</div>
  </main>
</section>

<!-- 編集 -->
<section id="edit" class="screen">
  <header>
    <button id="btnBackShelf">← ほんだな</button>
    <h1 id="editTitle">ほん</h1>
    <button id="btnRename">なまえ</button>
    <button id="btnExport">かきだし</button>
    <button id="btnPrint">いんさつ</button>
    <button id="btnDeleteBook" class="danger">さくじょ</button>
    <button id="btnPlay" class="primary">▶ よむ</button>
  </header>
  <main>
    <div id="pageList" class="pages"></div>
    <div style="max-width:760px;margin:16px auto 0">
      <button id="btnAddPage" class="big primary" style="width:100%">＋ ページを ついか</button>
    </div>
  </main>
</section>

<!-- 再生 -->
<section id="play" class="screen">
  <div id="playStage">
    <div id="micBar" class="hide"><div id="micFill"></div><div id="micThr"></div></div>
    <div id="playText"></div>
    <div id="playHint">がめんを タップ すると こえが ながれます</div>
  </div>
  <div class="playbar">
    <button id="btnPlayBack">とじる</button>
    <button id="btnPrev">◀ まえ</button>
    <div class="pos" id="playPos">1 / 1</div>
    <button id="btnMic">🎤 おとスイッチ</button>
    <button id="btnNext">つぎ ▶</button>
    <button id="btnAuto">じどう ▶▶</button>
    <button id="btnSettings">⚙</button>
  </div>
</section>

<!-- 録音モーダル -->
<div id="recModal" class="modal">
  <div class="sheet">
    <h2 id="recTitle">ページ 1</h2>
    <div class="row"><input id="recLabel" type="text" placeholder="ことば（がめんに でます）"></div>
    <div class="row">
      <button id="btnPickImg" class="big" style="flex:1">🖼 しゃしん</button>
      <button id="btnPickSym" class="big" style="flex:1">🔣 シンボル</button>
      <button id="btnPickVid" class="big" style="flex:1">🎬 どうが</button>
    </div>
    <div class="row">
      <button id="btnClearImg" style="flex:1">がぞうを けす</button>
      <button id="btnClearVid" style="flex:1">どうがを けす</button>
    </div>
    <div id="recPreview" class="thumb" style="width:100%;height:180px;margin-bottom:12px"></div>
    <div class="row">
      <button id="btnRec" class="big danger" style="flex:1">● ろくおん</button>
      <button id="btnPlayRec" class="big" style="flex:1">▶ きく</button>
    </div>
    <div id="recState" class="empty" style="padding:8px">こえは まだ ありません</div>
    <div class="row" style="margin-top:8px">
      <button id="btnRecCancel" style="flex:1">やめる</button>
      <button id="btnRecSave" class="primary big" style="flex:2">ほぞん</button>
    </div>
  </div>
</div>

<!-- 自前ダイアログ（prompt/confirmが出ない環境でも確実に動く） -->
<div id="dlg" class="modal">
  <div class="sheet" style="max-width:420px">
    <h2 id="dlgMsg">?</h2>
    <div class="row"><input id="dlgInput" type="text"></div>
    <div class="row">
      <button id="dlgNo" style="flex:1">やめる</button>
      <button id="dlgYes" class="primary big" style="flex:2">OK</button>
    </div>
  </div>
</div>

<!-- シンボルえらび（ドロップス。画像はこのサイトに同梱＝外部サーバに つながない） -->
<div id="symModal" class="modal">
  <div class="sheet" style="max-width:860px;width:min(860px,100%);display:flex;flex-direction:column;overflow:hidden">
    <h2>シンボルを えらぶ</h2>
    <div class="row"><input id="symSearch" type="text" placeholder="ことば や よみ で さがす（れい：いぬ）"></div>
    <div class="row seg" id="symCats"></div>
    <div id="symCount" style="color:var(--sub);font-size:13px;margin-bottom:6px"></div>
    <div id="symScroll">
      <div id="symGrid" class="symgrid"></div>
      <div id="symSentinel" style="height:1px"></div>
    </div>
    <div class="row" style="margin-top:12px">
      <button id="btnSymCancel" class="big" style="flex:1">やめる</button>
    </div>
  </div>
</div>

<!-- シンボル かくにん（まちがい タップ よけ） -->
<div id="symConfirm" class="modal" style="z-index:11">
  <div class="sheet" style="max-width:420px;text-align:center">
    <div id="symBig"></div>
    <h2 id="symBigWord" style="margin:10px 0 2px"></h2>
    <div id="symBigRead" style="color:var(--sub);font-size:15px"></div>
    <div class="row" style="margin-top:16px">
      <button id="btnSymBack" style="flex:1">もどる</button>
      <button id="btnSymUse" class="primary big" style="flex:2">これに する</button>
    </div>
  </div>
</div>

<!-- せってい（じどう送りの速さ・おとスイッチの感度） -->
<div id="setModal" class="modal">
  <div class="sheet">
    <h2>せってい</h2>
    <div class="setlabel">じどうで つぎへ すすむ はやさ</div>
    <div class="row seg" id="segGap">
      <button data-g="short">はやい</button>
      <button data-g="normal">ふつう</button>
      <button data-g="long">ゆっくり</button>
    </div>
    <div class="setlabel">おとスイッチの かんど（びんかんさ）</div>
    <div class="setmeter"><div id="setMeterFill"></div><span id="setMeterThr"></span></div>
    <input id="rngSens" type="range" min="1" max="99" value="50">
    <div class="empty" style="padding:6px;font-size:14px;text-align:left">スライダーを うごかし、こえを だして あかい線を こえたら 反応します。<br>みぎに するほど 小さな音でも 反応します。</div>
    <div class="row" style="margin-top:12px">
      <button id="btnSetClose" class="primary big" style="flex:1">とじる</button>
    </div>
  </div>
</div>

<!-- 印刷用（ふだんは非表示。いんさつ時だけ出る） -->
<div id="printArea"></div>

<input id="fileImg" type="file" accept="image/*" class="hide">
<input id="fileVid" type="file" accept="video/*" class="hide">
<input id="fileJson" type="file" accept="application/json" class="hide">

<script>
/* ---------- IndexedDB（ブラウザ内の保存庫。音声・画像を大きいまま保存できる） ---------- */
const DB='koenohon';let db;
function open(){return new Promise((ok,ng)=>{const r=indexedDB.open(DB,1);
  r.onupgradeneeded=e=>{const d=e.target.result;
    d.createObjectStore('books',{keyPath:'id'});
    const p=d.createObjectStore('pages',{keyPath:'id'});p.createIndex('book','bookId');};
  r.onsuccess=e=>{db=e.target.result;ok()};r.onerror=()=>ng(r.error);});}
function tx(s,m='readonly'){return db.transaction(s,m).objectStore(s);}
function req(r){return new Promise((ok,ng)=>{r.onsuccess=()=>ok(r.result);r.onerror=()=>ng(r.error);});}
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);

async function getBooks(){const b=await req(tx('books').getAll());return b.sort((a,c)=>c.created-a.created);}
async function getPages(id){const p=await req(tx('pages').index('book').getAll(id));return p.sort((a,b)=>a.order-b.order);}
const putBook=b=>req(tx('books','readwrite').put(b));
const putPage=p=>req(tx('pages','readwrite').put(p));
const delPage=id=>req(tx('pages','readwrite').delete(id));
async function delBook(id){const ps=await getPages(id);const s=db.transaction(['books','pages'],'readwrite');
  ps.forEach(p=>s.objectStore('pages').delete(p.id));s.objectStore('books').delete(id);
  return new Promise(ok=>s.oncomplete=ok);}

/* ---------- 画面切替 ---------- */
const $=id=>document.getElementById(id);
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.toggle('on',s.id===id));}
/* 画像・音声・動画のBlobはURL化して表示する。以前は描画のたびに新しいURLを作って
   解放しておらず、使うほどメモリを消費していた。ここでBlobごとに1つだけURLを作って
   使い回し（WeakMap）、画面を切り替える節目でまとめて解放する（revokeAll）。 */
let _urlMap=new WeakMap();const _urlSet=new Set();
function url(b){if(!b)return'';let u=_urlMap.get(b);if(!u){u=URL.createObjectURL(b);_urlMap.set(b,u);_urlSet.add(u);}return u;}
function revokeAll(){_urlSet.forEach(u=>{try{URL.revokeObjectURL(u);}catch(e){}});_urlSet.clear();_urlMap=new WeakMap();}

  $('editTitle').textContent=book.title;show('edit');drawPages();

function drawPages(){
  const box=$('pageList');box.innerHTML='';
  pages.forEach((p,i)=>{
    const el=document.createElement('div');el.className='page'+((p.audio||p.video)?' has':'');
    const thumb=p.image?`<img src="${url(p.image)}">`:(p.video?'🎬':'🖼');
    const wave='<span class="wave" style="height:14px"><i></i><i></i><i></i><i></i><i></i></span>';
    const bits=[];
    if(p.audio)bits.push(wave+' こえ');
    if(p.video)bits.push('🎬 どうが');
    const stateHtml=bits.length?bits.join('　')+' あり':'こえは まだ ありません';
    el.innerHTML=`<div class="num">${i+1}</div>
      <div class="thumb">${thumb}</div>
      <div class="body"><div class="label"></div><div class="state">${stateHtml}</div></div>
      <div class="ops">
        <button data-a="up">▲</button><button data-a="down">▼</button>
        <button data-a="dup">ふくせい</button>
        <button data-a="edit" class="primary">なおす</button>
        <button data-a="del" class="danger">けす</button>
      </div>`;
    el.querySelector('.label').textContent=p.label||'（ことば なし）';
    el.querySelectorAll('button').forEach(b=>b.onclick=()=>pageOp(b.dataset.a,i));
    box.appendChild(el);
  });

async function reorder(){for(let i=0;i<pages.length;i++){pages[i].order=i;await putPage(pages[i]);}}
async function pageOp(a,i){
  if(a==='edit')return openRec(pages[i]);
  if(a==='dup'){const p=pages[i];
    const np={id:uid(),bookId,order:i+1,label:p.label,image:p.image,video:p.video,audio:p.audio};
    pages.splice(i+1,0,np);await reorder();return drawPages();}
  if(a==='del'){if(!await dialog('この ページを けしますか？'))return;
    await delPage(pages[i].id);pages.splice(i,1);await reorder();return drawPages();}
  const j=a==='up'?i-1:i+1;if(j<0||j>=pages.length)return;
  [pages[i],pages[j]]=[pages[j],pages[i]];await reorder();drawPages();
}

/* 画像は長辺1600pxに縮小して保存（容量を抑え、iPadでも軽く動くため） */
function shrink(file){return new Promise(ok=>{
  const i=new Image();const tmp=URL.createObjectURL(file);
  i.onload=()=>{
    const m=1600,s=Math.min(1,m/Math.max(i.width,i.height));
    const c=document.createElement('canvas');c.width=i.width*s;c.height=i.height*s;
    c.getContext('2d').drawImage(i,0,0,c.width,c.height);
    c.toBlob(b=>{URL.revokeObjectURL(tmp);ok(b);},'image/jpeg',.85);
  };i.src=tmp;});}

$('btnRec').onclick=async()=>{
  if(mr&&mr.state==='recording'){mr.stop();return;}
  try{
    const st=await navigator.mediaDevices.getUserMedia({audio:true});
    mr=new MediaRecorder(st);chunks=[];
    mr.ondataavailable=e=>chunks.push(e.data);
    mr.onstop=()=>{aud=new Blob(chunks,{type:mr.mimeType||'audio/webm'});
      st.getTracks().forEach(t=>t.stop());
      $('btnRec').innerHTML='● ろくおん';$('btnRec').classList.add('danger');drawRecPreview();};
    mr.start();
    $('btnRec').innerHTML='<span class="recdot"></span>とめる';
    $('recState').textContent='ろくおん ちゅう…';
  }catch(e){alert('マイクが つかえません。ブラウザの マイク きょかを かくにんしてください。');}
};

let idx=0,player=null,auto=false;
$('btnPlay').onclick=()=>{if(!pages.length)return alert('ページが ありません');idx=0;auto=false;show('play');drawPlay();};
$('btnPlayBack').onclick=()=>{stopPlay();auto=false;micToggle=false;$('btnMic').classList.remove('on');$('micBar').classList.add('hide');micStop();$('setModal').classList.remove('on');show('edit');};
$('btnPrev').onclick=()=>{if(idx>0){idx--;drawPlay();}};
$('btnNext').onclick=()=>{if(idx<pages.length-1){idx++;drawPlay();}};
$('btnAuto').onclick=()=>{auto=!auto;$('btnAuto').textContent=auto?'じどう ■':'じどう ▶▶';if(auto)playCur();};
function drawPlay(){
  stopPlay();
  const p=pages[idx],st=$('playStage');
  st.querySelectorAll('img,video').forEach(e=>e.remove());
  $('playText').textContent=(p.image||p.video)?'':(p.label||'');
  if(p.video){const v=document.createElement('video');v.src=url(p.video);
    v.playsInline=true;v.setAttribute('playsinline','');st.prepend(v);}
  else if(p.image){const i=document.createElement('img');i.src=url(p.image);st.prepend(i);}
  $('playPos').textContent=`${idx+1} / ${pages.length}`;
}
function stopPlay(){if(player){player.pause();player=null;}$('playStage').classList.remove('playing');}
function playCur(){
  stopPlay();const p=pages[idx],st=$('playStage');
  /* 動画が あれば 動画（音つき）を さいせん。なければ ろくおんした こえ */
  const media=p.video?st.querySelector('video'):(p.audio?new Audio(url(p.audio)):null);
  if(!media){if(auto)setTimeout(nextAuto,gapMs(500));return;}
  player=media;if(p.video)media.currentTime=0;
  st.classList.add('playing');
  media.onended=()=>{st.classList.remove('playing');if(auto)setTimeout(nextAuto,gapMs());};
  media.play();
}
function nextAuto(){if(!auto)return;if(idx<pages.length-1){idx++;drawPlay();playCur();}
  else{auto=false;$('btnAuto').textContent='じどう ▶▶';}}
/* 画面全体がスイッチ：タップで再生 → もう一度タップで次のページ */
$('playStage').onclick=()=>{
  if(player&&!player.paused){stopPlay();if(idx<pages.length-1){idx++;drawPlay();}return;}
  playCur();
};

/* ---------- せってい（じどう送りの速さ・おとスイッチ感度） ---------- */
const SET_KEY='koenohon_set';
let settings=Object.assign({gap:'normal',sens:50},(()=>{try{return JSON.parse(localStorage.getItem(SET_KEY)||'{}');}catch(e){return{};}})());
function saveSet(){try{localStorage.setItem(SET_KEY,JSON.stringify(settings));}catch(e){}}
const GAPMS={short:250,normal:700,long:1600};
function gapMs(extra){return GAPMS[settings.gap||'normal']+(extra||0);}

/* ---------- おとスイッチ（マイクの音量に反応して再生・ページ送り） ---------- */
const METER_MAX=0.4; // メーター表示の上限（rms値）
function micThreshold(){return 0.02+(100-settings.sens)/100*0.18;} // 感度が高いほど しきい値は低い
function updateMeter(rms){
  const pct=Math.min(100,rms/METER_MAX*100);
  const f=$('micFill');if(f)f.style.width=pct+'%';
  const sf=$('setMeterFill');if(sf)sf.style.width=pct+'%';
}
function placeThr(){
  const l=Math.min(100,micThreshold()/METER_MAX*100)+'%';
  const a=$('micThr');if(a)a.style.left=l;
  const b=$('setMeterThr');if(b)b.style.left=l;
}
let micStream=null,micCtx=null,micAna=null,micRAF=null,micToggle=false,micArmed=true,micCool=0;
async function micStart(){
  if(micStream)return true;
  try{
    micStream=await navigator.mediaDevices.getUserMedia({audio:true});
    micCtx=new (window.AudioContext||window.webkitAudioContext)();
    if(micCtx.state==='suspended')await micCtx.resume();
    const src=micCtx.createMediaStreamSource(micStream);
    micAna=micCtx.createAnalyser();micAna.fftSize=1024;src.connect(micAna);
    const buf=new Uint8Array(micAna.fftSize);
    const tick=()=>{
      if(!micAna)return;
      micAna.getByteTimeDomainData(buf);
      let s=0;for(let i=0;i<buf.length;i++){const v=(buf[i]-128)/128;s+=v*v;}
      const rms=Math.sqrt(s/buf.length);
      updateMeter(rms);
      const thr=micThreshold();
      if(micToggle){
        if(micArmed&&rms>thr&&Date.now()>micCool){micArmed=false;micCool=Date.now()+700;$('playStage').click();}
        else if(!micArmed&&rms<thr*0.55)micArmed=true; // しずかに なったら また反応できる（誤作動よけ）
      }
      micRAF=requestAnimationFrame(tick);
    };
    placeThr();micRAF=requestAnimationFrame(tick);
    return true;
  }catch(e){micStream=null;micCtx=null;micAna=null;return false;}
}
function micStop(){
  if(micRAF)cancelAnimationFrame(micRAF);micRAF=null;
  if(micStream){micStream.getTracks().forEach(t=>t.stop());micStream=null;}
  if(micCtx){try{micCtx.close();}catch(e){}micCtx=null;}
  micAna=null;updateMeter(0);
}
$('btnMic').onclick=async()=>{
  micToggle=!micToggle;micArmed=true;
  $('btnMic').classList.toggle('on',micToggle);
  $('micBar').classList.toggle('hide',!micToggle);
  if(micToggle){
    const ok=await micStart();
    if(!ok){micToggle=false;$('btnMic').classList.remove('on');$('micBar').classList.add('hide');
      alert('マイクが つかえません。https（GitHub Pages）で ひらき、マイクの きょかを ゆるしてください。');}
    else placeThr();
  }else if(!$('setModal').classList.contains('on')){micStop();}
};

/* ---------- シンボルえらび（ドロップス） ----------
   画像・一覧ともこのサイトに同梱しているため、外部サーバには一切つながない。
   えらんだシンボルは PNG を取り込んで page.image（Blob）に入れる＝写真と同じ扱い。
   こうすると 再生・いんさつ・かきだし・ふくせい は そのまま動く。 */
const SYM_CATS=[['','すべて'],['10','人・動植物'],['20','動き・様子'],['30','飲食物'],['40','家の中'],['50','家の外'],['60','文化・社会']];
const SYM_CHUNK=120; // iPadが重くならないよう 少しずつ描画する
let symList=null,symCat='',symFiltered=[],symShown=0,symPick=null,symIO=null;
async function symLoad(){
  if(symList)return symList;
  const r=await fetch('symbols.json');
  if(!r.ok)throw new Error('symbols.json '+r.status);
  symList=await r.json();
  return symList;
}
function symRenderChunk(){
  const g=$('symGrid');
  const end=Math.min(symShown+SYM_CHUNK,symFiltered.length);
  const frag=document.createDocumentFragment();
  for(let i=symShown;i<end;i++){
    const s=symFiltered[i];
    const t=document.createElement('button');t.className='symtile';
    t.innerHTML=`<img loading="lazy" src="symbols/${s[0]}.png" alt=""><div class="w"></div>`;
    t.querySelector('.w').textContent=s[1];
    t.onclick=()=>symOpenConfirm(s);
    frag.appendChild(t);
  }
  g.appendChild(frag);symShown=end;
}
function symFilter(){
  const q=$('symSearch').value.trim().toLowerCase();
  symFiltered=symList.filter(s=>{
    if(symCat&&s[0].slice(0,2)!==symCat)return false;
    if(!q)return true;
    return s[1].toLowerCase().includes(q)||s[2].includes(q);
  });
  symShown=0;$('symGrid').innerHTML='';
  $('symCount').textContent=`${symFiltered.length} こ`;
  symRenderChunk();
}
function symOpenConfirm(s){
  symPick=s;
  $('symBig').innerHTML=`<img src="symbols/${s[0]}.png" alt="">`;
  $('symBigWord').textContent=s[1];
  $('symBigRead').textContent=s[2]||'';
  $('symConfirm').classList.add('on');
}
$('btnPickSym').onclick=async()=>{
  $('btnPickSym').disabled=true;
  try{
    await symLoad();
    if(!$('symCats').childElementCount){
      SYM_CATS.forEach(([v,name])=>{const b=document.createElement('button');
        b.textContent=name;b.dataset.c=v;
        b.onclick=()=>{symCat=v;document.querySelectorAll('#symCats button').forEach(x=>x.classList.toggle('on',x.dataset.c===v));symFilter();$('symScroll').scrollTop=0;};
        $('symCats').appendChild(b);});
      // スクロールで つづきを 読み込む
      symIO=new IntersectionObserver(es=>{if(es[0].isIntersecting&&symShown<symFiltered.length)symRenderChunk();},{root:$('symScroll'),rootMargin:'300px'});
      symIO.observe($('symSentinel'));
    }
    document.querySelectorAll('#symCats button').forEach(x=>x.classList.toggle('on',x.dataset.c===symCat));
    symFilter();$('symScroll').scrollTop=0;
    $('symModal').classList.add('on');
  }catch(e){alert('シンボルの いちらんを よみこめませんでした。');}
  $('btnPickSym').disabled=false;
};
$('symSearch').oninput=()=>{if(symList){symFilter();$('symScroll').scrollTop=0;}};
$('btnSymCancel').onclick=()=>$('symModal').classList.remove('on');
$('btnSymBack').onclick=()=>$('symConfirm').classList.remove('on');
$('btnSymUse').onclick=async()=>{
  if(!symPick)return;
  try{
    const r=await fetch(`symbols/${symPick[0]}.png`);
    if(!r.ok)throw new Error('png '+r.status);
    const b=await r.blob();
    /* 種類を image/png に そろえる。サーバの設定しだいで octet-stream で返ることがあり、
       その種類が かきだしJSONに そのまま入ると 他の端末で 絵が でないため。 */
    img=b.type==='image/png'?b:new Blob([b],{type:'image/png'}); // 写真と同じ扱い（ことばは自動入力しない）
    $('symConfirm').classList.remove('on');$('symModal').classList.remove('on');
    drawRecPreview();
  }catch(e){alert('この シンボルを とりこめませんでした。');}
};

/* ---------- いんさつ（紙の絵本として出力） ---------- */
function esc(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
$('btnPrint').onclick=()=>{
  if(!pages.length)return alert('ページが ありません');
  let cards='';
  pages.forEach((p,i)=>{
    const vis=p.image?`<img src="${url(p.image)}">`:`<div class="p-ph">${p.video?'🎬':'🖼'}</div>`;
    cards+=`<div class="p-card"><div class="p-num">${i+1}</div>${vis}<div class="p-label">${esc(p.label)||'&nbsp;'}</div></div>`;
  });
  $('printArea').innerHTML=`<div class="p-title">${esc(book.title)}</div><div class="p-grid">${cards}</div>`;
  window.print();
};

if(location.protocol==='file:'){
  const w=document.createElement('div');
  w.style.cssText='background:#c4453b;color:#fff;padding:10px 16px;font-size:14px;text-align:center';
  w.textContent='この ひらきかたでは ろくおんが できません。GitHub Pages（https）から ひらいてください。';
  document.body.prepend(w);
}
open().then(drawShelf);
</script>
